<!DOCTYPE html>
<html>
<head>
<title>Select Role</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">
    <h1>Select Your Role</h1>

    <div class="card-container">

        <div class="card" onclick="go('user')">
            <h2>👤 User</h2>
            <p>Request blood support</p>
        </div>

        <div class="card" onclick="go('donor')">
            <h2>🩸 Donor</h2>
            <p>Donate and save lives</p>
        </div>

        <div class="card" onclick="go('admin')">
            <h2>⚙️ Admin</h2>
            <p>Manage system</p>
        </div>

    </div>
</div>

<script>
function go(role){
    if(role === "admin"){
        window.location = "/admin-login";
    } else {
        localStorage.setItem("role", role);
        window.location = "/login";
    }
}
</script>

</body>
</html>
